<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; media-src 'self' blob:; connect-src 'self';"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="referrer" content="no-referrer" />
    <title>louper-truc</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:," />
  </head>
  <body>
    <header>
      <h1>louper-truc</h1>
      <div class="controls">
        <button id="btnLoad">Load audio</button>
        <select id="trackSelect" class="track-select">
          <option disabled selected>Load a track…</option>
        </select>
        <button id="btnPlay">Play</button>
        <button id="btnLoop" title="Toggle loop on selected region">Loop: off</button>
        <button id="btnResetZoom">Reset view</button>
        <span class="speed-btns" id="speedBtns"
          ><button data-speed="0.5">50%</button><button data-speed="0.6">60%</button
          ><button data-speed="0.7">70%</button><button data-speed="0.8">80%</button
          ><button data-speed="0.9">90%</button><button data-speed="1" class="active">100%</button
          ><button data-speed="1.1">110%</button></span
        >
        <label
          >Zoom <input id="zoomCtrl" type="range" min="1" max="100" step="0.1" value="1"
        /></label>
      </div>
      <div class="status" id="status"><span class="pill">No audio loaded</span></div>
      <button id="btnTheme" title="Toggle dark/light mode"></button>
      <input type="file" id="fileInput" accept="audio/*" />
    </header>

    <div class="dropzone" id="dropzone">
      <canvas id="waveform"></canvas>
      <canvas id="overlayCanvas"></canvas>
      <div class="overlay" id="overlay">
        <div class="card">
          <h2>Drop an audio file here</h2>
          <p>OGG, MP3, WAV, FLAC — anything your browser can decode.</p>
          <div class="track-row">
            <select id="trackSelectOverlay" class="track-select">
              <option disabled selected>Choose a jazz track…</option>
            </select>
            <button id="btnDemo">Load demo (King Oliver — Krooked Blues, 1923)</button>
          </div>
        </div>
      </div>
      <div class="zoom-hint hidden" id="zoomHint">
        Scroll to pan · Shift+scroll to zoom · Drag to loop · Click to cue
      </div>
      <div class="build-info" id="buildInfo">
        <a
          href="https://github.com/maedoc/louper-truc/actions/runs/__GITHUB_RUN_ID__"
          target="_blank"
          rel="noopener"
          id="buildLink"
          >__GITHUB_SHA__</a
        >
      </div>
    </div>

    <div class="scrub-wrap">
      <span id="timeStart">0:00.0</span>
      <input id="scrub" type="range" min="0" max="0" step="0.001" value="0" />
      <span id="timeEnd">0:00.0</span>
    </div>

    <script src="js/main.js" type="module"></script>
  </body>
</html>
