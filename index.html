<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>louper-truc — music transcription looper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0e0e0e;
      color: #e8e8e8;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; color: #fff; }
    .controls {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    button {
      background: #1f1f1f;
      border: 1px solid #333;
      color: #e8e8e8;
      padding: 0.35rem 0.7rem;
      border-radius: 0.35rem;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button:hover { background: #2a2a2a; border-color: #444; }
    button.active { background: #2b4a2b; border-color: #4a7a4a; color: #c8f0c8; }
    label { font-size: 0.8rem; color: #999; }
    input[type="file"] { display: none; }
    .dropzone {
      position: relative;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .overlay .card {
      background: rgba(20,20,20,0.95);
      border: 1px dashed #555;
      padding: 2rem 2.5rem;
      border-radius: 0.6rem;
      text-align: center;
      pointer-events: auto;
    }
    .overlay .card h2 { font-size: 1.1rem; margin-bottom: 0.4rem; color: #fff; }
    .overlay .card p { color: #999; font-size: 0.9rem; margin-bottom: 1rem; }
    .hidden { display: none !important; }
    .status {
      font-size: 0.75rem;
      color: #888;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .status .pill {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 0.15rem 0.45rem;
      border-radius: 0.25rem;
      color: #ccc;
    }
    input[type="range"] {
      accent-color: #6fa8dc;
      vertical-align: middle;
    }
    .scrub-wrap {
      padding: 0.5rem 1rem;
      border-top: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .scrub-wrap input[type="range"] { flex: 1; }
    .zoom-hint {
      position: absolute;
      bottom: 0.5rem;
      right: 0.8rem;
      font-size: 0.7rem;
      color: #666;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>louper-truc</h1>
    <div class="controls">
      <button id="btnLoad">Load audio</button>
      <button id="btnPlay">Play</button>
      <button id="btnLoop" title="Toggle loop on selected region">Loop: off</button>
      <button id="btnResetZoom" title="Reset zoom/pan">Reset view</button>
      <label>Speed: <input id="speed" type="range" min="0.25" max="2" step="0.05" value="1" style="width:120px;"> <span id="speedVal">1.0×</span></label>
      <label>Zoom: <input id="zoom" type="range" min="1" max="100" step="0.1" value="1" style="width:120px;"></label>
    </div>
    <div class="status" id="status">
      <span class="pill">No audio loaded</span>
    </div>
    <input type="file" id="fileInput" accept="audio/*">
  </header>

  <div class="dropzone" id="dropzone">
    <canvas id="waveform"></canvas>
    <div class="overlay" id="overlay">
      <div class="card">
        <h2>Drop an audio file here</h2>
        <p>OGG, MP3, WAV, FLAC — anything your browser can decode.</p>
        <button id="btnDemo">Load demo (King Oliver — Krooked Blues, 1923)</button>
      </div>
    </div>
    <div class="zoom-hint" id="zoomHint">Scroll to zoom · Drag to pan</div>
  </div>

  <div class="scrub-wrap">
    <span id="timeStart">0:00.0</span>
    <input id="scrub" type="range" min="0" max="0" step="0.001" value="0">
    <span id="timeEnd">0:00.0</span>
  </div>

  <script>
    // ── State ──
    const state = {
      ctx: null,
      buffer: null,
      source: null,
      startedAt: 0,
      pausedAt: 0,
      duration: 0,
      playing: false,
      speed: 1,
      zoom: 1,
      pan: 0,
      cue: 0,
      loopOn: false,
      loopStart: 0,
      loopEnd: 0,
      selecting: false,
      selStartX: 0,
      peaks: [],
      peakStep: 1,
      canvasWidth: 0,
      canvasHeight: 0,
      demoLoaded: false,
    };

    // ── DOM ──
    const canvas = document.getElementById('waveform');
    const ctx2d = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const dropzone = document.getElementById('dropzone');
    const status = document.getElementById('status');
    const btnPlay = document.getElementById('btnPlay');
    const btnLoop = document.getElementById('btnLoop');
    const btnLoad = document.getElementById('btnLoad');
    const btnDemo = document.getElementById('btnDemo');
    const fileInput = document.getElementById('fileInput');
    const speedInput = document.getElementById('speed');
    const speedVal = document.getElementById('speedVal');
    const zoomInput = document.getElementById('zoom');
    const btnResetZoom = document.getElementById('btnResetZoom');
    const scrub = document.getElementById('scrub');
    const timeStart = document.getElementById('timeStart');
    const timeEnd = document.getElementById('timeEnd');
    const zoomHint = document.getElementById('zoomHint');

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = dropzone.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      canvas.style.width = rect.width + 'px';
      canvas.style.height = rect.height + 'px';
      state.canvasWidth = canvas.width;
      state.canvasHeight = canvas.height;
      ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ── Audio helpers ──
    function getAudioCtx() {
      if (!state.ctx) state.ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (state.ctx.state === 'suspended') state.ctx.resume();
      return state.ctx;
    }

    function stopSource() {
      if (state.source) {
        try { state.source.stop(); } catch(e){}
        state.source.disconnect?.();
        state.source = null;
      }
      state.playing = false;
      btnPlay.textContent = 'Play';
    }

    function playFrom(when, offset) {
      const ac = getAudioCtx();
      stopSource();
      const src = ac.createBufferSource();
      src.buffer = state.buffer;
      src.playbackRate.value = state.speed;
      src.connect(ac.destination);
      src.onended = () => {
        if (!state.playing) return;
        const now = ac.currentTime;
        const effectiveDuration = state.duration / state.speed;
        const elapsed = (now - state.startedAt);
        const pos = state.pausedAt + elapsed;
        if (state.loopOn && state.loopEnd > state.loopStart) {
          if (pos >= state.loopEnd - 0.02) {
            scheduleLoop();
            return;
          }
        }
        if (pos >= effectiveDuration - 0.02) {
          state.playing = false;
          state.pausedAt = 0;
          btnPlay.textContent = 'Play';
          draw();
        }
      };
      src.start(0, offset);
      state.source = src;
      state.startedAt = ac.currentTime;
      state.pausedAt = offset;
      state.playing = true;
      btnPlay.textContent = 'Pause';
      requestAnimationFrame(tick);
    }

    function scheduleLoop() {
      const ac = getAudioCtx();
      stopSource();
      const src = ac.createBufferSource();
      src.buffer = state.buffer;
      src.playbackRate.value = state.speed;
      src.connect(ac.destination);
      src.onended = () => {
        if (state.playing && state.loopOn) scheduleLoop();
      };
      const off = state.loopStart;
      const dur = (state.loopEnd - state.loopStart) / state.speed;
      src.start(0, off, dur);
      state.source = src;
      state.startedAt = ac.currentTime;
      state.pausedAt = off;
      state.playing = true;
      btnPlay.textContent = 'Pause';
    }

    function togglePlay() {
      if (!state.buffer) return;
      if (state.playing) {
        const ac = getAudioCtx();
        const now = ac.currentTime;
        state.pausedAt += (now - state.startedAt);
        stopSource();
      } else {
        const start = state.cue != null ? state.cue : state.pausedAt || 0;
        playFrom(0, start);
      }
    }

    function toggleLoop() {
      if (!state.buffer) return;
      state.loopOn = !state.loopOn;
      btnLoop.textContent = state.loopOn ? 'Loop: on' : 'Loop: off';
      btnLoop.classList.toggle('active', state.loopOn);
      if (state.playing) {
        if (state.loopOn && state.loopEnd > state.loopStart) {
          const ac = getAudioCtx();
          const now = ac.currentTime;
          const pos = state.pausedAt + (now - state.startedAt);
          if (pos < state.loopStart || pos >= state.loopEnd) {
            playFrom(0, state.loopStart);
          }
        }
      }
      draw();
    }

    // ── Decoding ──
    function decodeAndLoad(arrayBuffer, name) {
      const ac = getAudioCtx();
      ac.decodeAudioData(arrayBuffer, (buffer) => {
        state.buffer = buffer;
        state.duration = buffer.duration;
        state.pausedAt = 0;
        state.cue = 0;
        state.loopStart = 0;
        state.loopEnd = state.duration;
        state.loopOn = false;
        btnLoop.textContent = 'Loop: off';
        btnLoop.classList.remove('active');
        computePeaks(buffer);
        scrub.max = state.duration;
        overlay.classList.add('hidden');
        zoomHint.classList.remove('hidden');
        updateStatus(name || 'Loaded audio');
        resetZoom();
        draw();
      }, (err) => {
        alert('Failed to decode audio: ' + (err && err.message ? err.message : err));
      });
    }

    function computePeaks(buffer) {
      const ch = buffer.getChannelData(0);
      const total = ch.length;
      const maxPixels = 5000;
      const step = Math.max(1, Math.floor(total / maxPixels));
      const count = Math.floor(total / step);
      const peaks = new Float32Array(count * 2);
      for (let i = 0; i < count; i++) {
        let min = 0, max = 0;
        const base = i * step;
        for (let j = 0; j < step; j++) {
          const v = ch[base + j];
          if (v < min) min = v;
          if (v > max) max = v;
        }
        peaks[i * 2] = min;
        peaks[i * 2 + 1] = max;
      }
      state.peaks = peaks;
      state.peakStep = step / buffer.sampleRate;
    }

    // ── Drawing ──
    function timeToX(t) {
      const viewDur = state.duration / state.zoom;
      const x = (t - state.pan) / viewDur * state.canvasWidth;
      return x;
    }
    function xToTime(x) {
      const viewDur = state.duration / state.zoom;
      return state.pan + (x / state.canvasWidth) * viewDur;
    }

    function draw() {
      const W = state.canvasWidth / (window.devicePixelRatio || 1);
      const H = state.canvasHeight / (window.devicePixelRatio || 1);
      ctx2d.clearRect(0, 0, W, H);
      if (!state.buffer) return;

      const dpr = window.devicePixelRatio || 1;
      ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);

      const viewDur = state.duration / state.zoom;
      const t0 = Math.max(0, state.pan);
      const t1 = Math.min(state.duration, state.pan + viewDur);

      // loop region fill
      if (state.loopOn || state.loopEnd > state.loopStart) {
        const lx0 = timeToX(state.loopStart);
        const lx1 = timeToX(state.loopEnd);
        ctx2d.fillStyle = state.loopOn ? 'rgba(100,180,100,0.15)' : 'rgba(120,120,120,0.08)';
        ctx2d.fillRect(Math.max(0, lx0), 0, Math.min(W, lx1) - Math.max(0, lx0), H);
        ctx2d.strokeStyle = state.loopOn ? '#6fa86f' : '#555';
        ctx2d.lineWidth = 1;
        [lx0, lx1].forEach(x => {
          if (x >= 0 && x <= W) {
            ctx2d.beginPath();
            ctx2d.moveTo(x, 0);
            ctx2d.lineTo(x, H);
            ctx2d.stroke();
          }
        });
      }

      // waveform
      if (state.peaks.length > 0) {
        const peaks = state.peaks;
        const stepSec = state.peakStep;
        const amp = H * 0.42;
        const cy = H / 2;

        ctx2d.lineWidth = 1;
        ctx2d.strokeStyle = '#8ab4d8';
        ctx2d.beginPath();
        for (let x = 0; x < W; x++) {
          const t = xToTime(x);
          const idx = Math.floor(t / stepSec);
          if (idx < 0 || idx * 2 + 1 >= peaks.length) continue;
          const mn = peaks[idx * 2];
          const mx = peaks[idx * 2 + 1];
          ctx2d.moveTo(x, cy + mn * amp);
          ctx2d.lineTo(x, cy + mx * amp);
        }
        ctx2d.stroke();
      }

      // cue line
      const cx = timeToX(state.cue);
      if (cx >= 0 && cx <= W) {
        ctx2d.strokeStyle = '#f0c040';
        ctx2d.lineWidth = 2;
        ctx2d.beginPath();
        ctx2d.moveTo(cx, 0);
        ctx2d.lineTo(cx, H);
        ctx2d.stroke();
      }

      // playhead
      const ac = state.ctx;
      if (ac && state.playing) {
        const now = ac.currentTime;
        const pos = state.pausedAt + (now - state.startedAt);
        const px = timeToX(pos);
        if (px >= 0 && px <= W) {
          ctx2d.strokeStyle = '#ff4d4d';
          ctx2d.lineWidth = 2;
          ctx2d.beginPath();
          ctx2d.moveTo(px, 0);
          ctx2d.lineTo(px, H);
          ctx2d.stroke();
        }
      } else {
        const px = timeToX(state.pausedAt);
        if (px >= 0 && px <= W) {
          ctx2d.strokeStyle = '#ff4d4d';
          ctx2d.lineWidth = 2;
          ctx2d.beginPath();
          ctx2d.moveTo(px, 0);
          ctx2d.lineTo(px, H);
          ctx2d.stroke();
        }
      }
    }

    function tick() {
      if (!state.playing) return;
      draw();
      const ac = state.ctx;
      const now = ac.currentTime;
      const pos = state.pausedAt + (now - state.startedAt);
      scrub.value = Math.min(state.duration, pos);
      timeStart.textContent = fmt(pos);
      requestAnimationFrame(tick);
    }

    function fmt(t) {
      if (!isFinite(t)) t = 0;
      const m = Math.floor(t / 60);
      const s = Math.floor(t % 60);
      const ms = Math.floor((t % 1) * 10);
      return `${m}:${s.toString().padStart(2,'0')}.${ms}`;
    }

    function updateStatus(name) {
      const loopInfo = state.loopOn ? ` • loop ${fmt(state.loopStart)}–${fmt(state.loopEnd)}` : '';
      status.innerHTML = `<span class="pill">${name}</span> <span class="pill">${fmt(state.duration)}</span><span class="pill">cue ${fmt(state.cue)}</span>${loopInfo}`;
    }

    // ── Zoom / Pan ──
    function resetZoom() {
      state.zoom = 1;
      state.pan = 0;
      zoomInput.value = 1;
      draw();
    }

    function setZoom(val) {
      const oldView = state.duration / state.zoom;
      const oldCenter = state.pan + oldView / 2;
      state.zoom = Math.max(1, Math.min(100, val));
      const newView = state.duration / state.zoom;
      state.pan = Math.max(0, Math.min(state.duration - newView, oldCenter - newView / 2));
      draw();
    }

    zoomInput.addEventListener('input', () => setZoom(parseFloat(zoomInput.value)));

    // ── Mouse interaction ──
    let dragging = false;
    let panning = false;
    let lastX = 0;

    canvas.addEventListener('mousedown', (e) => {
      if (!state.buffer) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const t = xToTime(x);
      if (e.shiftKey) {
        state.loopEnd = Math.min(state.duration, Math.max(state.loopStart, t));
        state.loopOn = true;
        btnLoop.textContent = 'Loop: on';
        btnLoop.classList.add('active');
        updateStatus();
        draw();
        return;
      }
      if (e.button === 1 || e.altKey || (e.button === 0 && state.zoom > 1)) {
        panning = true;
        lastX = x;
        canvas.style.cursor = 'grabbing';
        return;
      }
      dragging = true;
      state.selecting = true;
      state.selStartX = x;
      state.loopStart = Math.max(0, Math.min(state.duration, t));
      state.loopEnd = state.loopStart;
      state.loopOn = false;
      btnLoop.textContent = 'Loop: off';
      btnLoop.classList.remove('active');
      draw();
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!state.buffer) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      if (panning) {
        const dx = x - lastX;
        lastX = x;
        const viewDur = state.duration / state.zoom;
        const dt = -(dx / state.canvasWidth) * viewDur;
        state.pan = Math.max(0, Math.min(state.duration - viewDur, state.pan + dt));
        draw();
        return;
      }
      if (dragging) {
        const t = xToTime(x);
        state.loopEnd = Math.max(0, Math.min(state.duration, t));
        draw();
      }
    });

    function endDrag() {
      if (!state.buffer) return;
      if (dragging) {
        dragging = false;
        state.selecting = false;
        if (state.loopEnd < state.loopStart) {
          const tmp = state.loopStart; state.loopStart = state.loopEnd; state.loopEnd = tmp;
        }
        if (state.loopEnd - state.loopStart > 0.05) {
          state.loopOn = true;
          btnLoop.textContent = 'Loop: on';
          btnLoop.classList.add('active');
        } else {
          state.cue = state.loopStart;
          state.loopStart = 0;
          state.loopEnd = state.duration;
          state.loopOn = false;
          btnLoop.textContent = 'Loop: off';
          btnLoop.classList.remove('active');
        }
        updateStatus();
        draw();
      }
      if (panning) {
        panning = false;
        canvas.style.cursor = 'crosshair';
      }
    }

    canvas.addEventListener('mouseup', endDrag);
    canvas.addEventListener('mouseleave', endDrag);

    canvas.addEventListener('click', (e) => {
      if (!state.buffer || dragging || panning || state.selecting) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const t = Math.max(0, Math.min(state.duration, xToTime(x)));
      state.cue = t;
      state.pausedAt = t;
      scrub.value = t;
      updateStatus();
      draw();
    });

    canvas.addEventListener('wheel', (e) => {
      if (!state.buffer) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const tOver = xToTime(x);
      const factor = e.deltaY > 0 ? 0.9 : 1.1;
      const newZoom = Math.max(1, Math.min(100, state.zoom * factor));
      const newView = state.duration / newZoom;
      state.pan = Math.max(0, Math.min(state.duration - newView, tOver - (x / state.canvasWidth) * newView));
      state.zoom = newZoom;
      zoomInput.value = newZoom;
      draw();
    }, { passive: false });

    // ── Scrub bar ──
    scrub.addEventListener('input', () => {
      if (!state.buffer) return;
      const t = parseFloat(scrub.value);
      state.pausedAt = t;
      if (state.playing) {
        playFrom(0, t);
      }
      timeStart.textContent = fmt(t);
      draw();
    });

    // ── Drag & drop ──
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.style.background = '#151515'; });
    dropzone.addEventListener('dragleave', () => { dropzone.style.background = ''; });
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.style.background = '';
      const f = e.dataTransfer.files[0];
      if (f) loadFile(f);
    });

    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = (ev) => decodeAndLoad(ev.target.result, file.name);
      reader.readAsArrayBuffer(file);
    }

    btnLoad.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

    // ── Demo ──
    btnDemo.addEventListener('click', async () => {
      try {
        const res = await fetch('assets/krooked_blues.ogg');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const ab = await res.arrayBuffer();
        decodeAndLoad(ab, 'King Oliver — Krooked Blues (1923)');
        state.demoLoaded = true;
      } catch (err) {
        alert('Could not load demo audio. Try dropping a local file instead.\n' + err.message);
      }
    });

    // ── Controls ──
    btnPlay.addEventListener('click', togglePlay);
    btnLoop.addEventListener('click', toggleLoop);
    btnResetZoom.addEventListener('click', resetZoom);
    speedInput.addEventListener('input', () => {
      state.speed = parseFloat(speedInput.value);
      speedVal.textContent = state.speed.toFixed(2) + '×';
      if (state.playing) {
        playFrom(0, state.pausedAt + (state.ctx.currentTime - state.startedAt));
      }
    });

    // ── Keyboard ──
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
      if (e.code === 'KeyL') toggleLoop();
      if (e.code === 'ArrowLeft') {
        const dt = e.shiftKey ? 5 : 1;
        state.pausedAt = Math.max(0, state.pausedAt - dt);
        if (state.playing) playFrom(0, state.pausedAt); else draw();
        scrub.value = state.pausedAt;
        timeStart.textContent = fmt(state.pausedAt);
      }
      if (e.code === 'ArrowRight') {
        const dt = e.shiftKey ? 5 : 1;
        state.pausedAt = Math.min(state.duration, state.pausedAt + dt);
        if (state.playing) playFrom(0, state.pausedAt); else draw();
        scrub.value = state.pausedAt;
        timeStart.textContent = fmt(state.pausedAt);
      }
    });
  </script>
</body>
</html>
