<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>louper-truc</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:,">
</head>
<body>
<header>
  <h1>louper-truc</h1>
  <div class="controls">
    <button id="btnLoad">Load audio</button>
    <select id="trackSelect" class="track-select"><option disabled selected>Load a track…</option></select>
    <button id="btnPlay">Play</button>
    <button id="btnLoop" title="Toggle loop on selected region">Loop: off</button>
    <button id="btnResetZoom">Reset view</button>
    <label>Speed <input id="speedCtrl" type="range" min="0.25" max="2" step="0.05" value="1"><span id="speedVal">1.0×</span></label>
    <label>Zoom <input id="zoomCtrl" type="range" min="1" max="100" step="0.1" value="1"></label>
  </div>
  <div class="status" id="status"><span class="pill">No audio loaded</span></div>
  <input type="file" id="fileInput" accept="audio/*">
</header>

<div class="dropzone" id="dropzone">
  <canvas id="waveform"></canvas>
  <div class="overlay" id="overlay">
    <div class="card">
      <h2>Drop an audio file here</h2>
      <p>OGG, MP3, WAV, FLAC — anything your browser can decode.</p>
      <div class="track-row">
        <select id="trackSelectOverlay" class="track-select">
          <option disabled selected>Choose a jazz track…</option>
        </select>
        <button id="btnDemo">Load demo (King Oliver — Krooked Blues, 1923)</button>
      </div>
    </div>
  </div>
  <div class="zoom-hint hidden" id="zoomHint">Scroll to zoom · Drag to pan · Shift+drag to loop · Click to cue</div>
  <div class="build-info" id="buildInfo">
    <a href="https://github.com/maedoc/louper-truc/actions/runs/{{GITHUB_RUN_ID}}" target="_blank" rel="noopener">{{GITHUB_SHA}}</a>
  </div>
</div>

<div class="scrub-wrap">
  <span id="timeStart">0:00.0</span>
  <input id="scrub" type="range" min="0" max="0" step="0.001" value="0">
  <span id="timeEnd">0:00.0</span>
</div>

<script src="app.js"></script>
</body>
</html>
