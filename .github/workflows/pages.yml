name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9afed3 # v4
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffab00248 # v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - name: Stamp build info & cache-bust into HTML
        env:
          RUN_ID: ${{ github.run_id }}
          SHA7: ${{ github.sha }}
        run: |
          python3 -c "
          import os, sys
          run_id = os.environ['RUN_ID']
          sha7 = os.environ['SHA7'][:7]
          with open('index.html') as f:
            content = f.read()
          before = content
          content = content.replace('{{GITHUB_RUN_ID}}', run_id)
          content = content.replace('{{GITHUB_SHA}}', sha7)
          content = content.replace('style.css', f'style.css?sha={sha7}')
          content = content.replace('js/main.js', f'js/main.js?sha={sha7}')
          if content == before:
            print('ERROR: no replacements made', file=sys.stderr)
            sys.exit(1)
          with open('index.html', 'w') as f:
            f.write(content)
          print('Build stamps applied — RUN_ID:', run_id, ' SHA:', sha7)
          "
      - name: Verify build stamps
        run: |
          grep -o 'href="[^"]*"' index.html | head -1
          grep -o '>[a-f0-9]\{7\}<' index.html || true
      - uses: actions/upload-pages-artifact@56afc609e7420260d3c00010e1b1d4f11c19f535 # v3
        with:
          path: .
      - uses: actions/deploy-pages@d6db91d4bb6e40623d6fa32a6403c3e5a2a5e0fd # v4
