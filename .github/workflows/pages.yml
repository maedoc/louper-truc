name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - name: Stamp build info & cache-bust into HTML
        env:
          RUN_ID: ${{ github.run_id }}
          SHA7: ${{ github.sha }}
        run: |
          python3 -c "
          import os, sys
          run_id = os.environ['RUN_ID']
          sha7 = os.environ['SHA7'][:7]
          with open('index.html') as f:
            content = f.read()
          before = content
          content = content.replace('__GITHUB_RUN_ID__', run_id)
          content = content.replace('__GITHUB_SHA__', sha7)
          content = content.replace('style.css', f'style.css?sha={sha7}')
          content = content.replace('js/main.js', f'js/main.js?sha={sha7}')
          if content == before:
            print('ERROR: no replacements made', file=sys.stderr)
            sys.exit(1)
          with open('index.html', 'w') as f:
            f.write(content)
          print('Build stamps applied — RUN_ID:', run_id, ' SHA:', sha7)
          "
      - name: Verify build stamps
        run: |
          grep -o 'href="[^"]*"' index.html | head -1
          grep -o '>[a-f0-9]\{7\}<' index.html || true
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: .
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
