name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build info into HTML
        run: |
          sed -i 's|{{GITHUB_RUN_ID}}|'$GITHUB_RUN_ID'|g' index.html
          sed -i 's|{{GITHUB_SHA}}|'${GITHUB_SHA:0:7}'|g' index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
